<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>บันทึกข้อมูล Splitter Box (Cloud Run v.2026)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f4f6f9; padding: 20px 10px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .box { border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); border-top: 5px solid #485fc7; }
        .label { color: #4a4a4a; margin-bottom: 0.2rem; }
        .notification { border-radius: 10px; }
        #btnSave { transition: all 0.3s; }
        #btnSave:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="container is-max-desktop">
        <div class="box" id="mainForm" style="display: none;">
            <h1 class="title is-4 has-text-centered mb-4">📸 บันทึกข้อมูลงาน Splitter</h1>
            
            <div id="statusBox" class="notification is-info is-light py-2 px-3 mb-4 has-text-centered">
                <p id="locInfo" class="is-size-6 has-text-weight-bold">📡 กำลังดึงพิกัดจากระบบ AI...</p>
            </div>
            
            <form id="dataForm" onsubmit="submitData(event)">
                <div class="field">
                    <label class="label is-small">Splitter ID / รหัสอุปกรณ์</label>
                    <div class="control">
                        <input id="spId" class="input is-link" type="text" placeholder="ตัวอย่าง: BKK-1234" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase().replace(/[^A-Z0-9-]/g, '')" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label is-small">ประเภทอุปกรณ์</label>
                    <div class="control">
                        <div class="select is-fullwidth is-link">
                            <select id="type" required>
                                <option>L2 (Splitter)</option>
                                <option>L1 (FDT)</option>
                                <option>OLT / Port</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label is-small">หมวดหมู่ความเสียหาย</label>
                    <div class="control">
                        <div class="select is-fullwidth is-link">
                            <select id="mainCase" onchange="updateSubCase()" required>
                                <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
                                <option>1. ภายนอก อุปกรณ์</option>
                                <option>2. ภายใน อุปกรณ์</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label is-small">อาการที่พบ (Sub-Case)</label>
                    <div class="control">
                        <div class="select is-fullwidth is-link">
                            <select id="subCase" required>
                                <option value="" disabled selected>-- เลือกหมวดหมู่ก่อน --</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label is-small">รายละเอียดเพิ่มเติม / หมายเหตุ</label>
                    <div class="control">
                        <textarea id="remark" class="textarea is-link" placeholder="ระบุสิ่งที่พบเพิ่มเติม..." rows="3" required></textarea>
                    </div>
                </div>

                <hr>

                <div class="buttons mt-5">
                    <button type="submit" id="btnSave" class="button is-link is-fullwidth is-medium has-text-weight-bold">💾 บันทึกข้อมูลลงตาราง</button>
                    <button type="button" onclick="liff.closeWindow()" class="button is-light is-fullwidth">ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 🧠 คอนฟิกหลัก (ตรงกับ Backend Cloud Run)
        const API_URL = "https://line-webhook-receiver-1008123539373.asia-southeast1.run.app"; 
        const LIFF_ID = "2009632305"; 
        
        let cacheData = {}; 

        const subCases = {
            "1. ภายนอก อุปกรณ์": ["1.1 ฝาปิด/ตัวล็อกชำรุด", "1.2 ไม่ได้ยึดเกาะตามมาตรฐาน", "1.3 ตำแหน่งต่ำ/หย่อน", "1.4 มีสัตว์ทำรังภายใน"],
            "2. ภายใน อุปกรณ์": ["2.1 Port เสีย/ชำรุด", "2.2 Connector/Pigtail เสื่อมสภาพ", "2.3 สายภายในพันกันยุ่งเหยิง"]
        };

        function updateSubCase() {
            const main = document.getElementById('mainCase').value;
            const sub = document.getElementById('subCase');
            sub.innerHTML = '<option value="" disabled selected>-- เลือกอาการที่พบ --</option>';
            if(subCases[main]) {
                subCases[main].forEach(item => {
                    sub.innerHTML += `<option value="${item}">${item}</option>`;
                });
            }
        }

        window.onload = async () => {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    // ดึงข้อมูลพิกัดที่ AI วิเคราะห์ค้างไว้จาก Firestore
                    const res = await fetch(`${API_URL}/api/checkUser?uid=${profile.userId}`);
                    const data = await res.json();
                    
                    if (data.cache) {
                        cacheData = data.cache;
                        document.getElementById('locInfo').innerText = `📍 พิกัด: ${cacheData.latLong}`;
                        document.getElementById('mainForm').style.display = 'block';
                    } else {
                        alert("⚠️ ไม่พบข้อมูลพิกัดในระบบ! กรุณาส่งรูปภาพเข้า LINE Bot เพื่อให้ AI สแกนก่อนเปิดหน้านี้ครับ");
                        liff.closeWindow();
                    }
                }
            } catch (err) {
                console.error(err);
                alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อระบบ");
            }
        };

        async function submitData(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.classList.add('is-loading');
            btn.disabled = true;

            const profile = await liff.getProfile();
            const payload = {
                uid: profile.userId,
                surveyName: profile.displayName,
                splitterId: document.getElementById('spId').value,
                type: document.getElementById('type').value,
                mainCase: document.getElementById('mainCase').value,
                subCase: document.getElementById('subCase').value,
                remark: document.getElementById('remark').value,
                latLong: cacheData.latLong,
                province: cacheData.province,
                tempFileName: cacheData.tempFileName
            };

            try {
                const res = await fetch(`${API_URL}/api/saveData`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (result.success) {
                    alert(`✅ บันทึกสำเร็จ!\nรหัสคิว: ${result.queueId}`);
                    liff.closeWindow();
                } else {
                    alert("❌ บันทึกไม่สำเร็จ: " + (result.error || "Unknown Error"));
                }
            } catch (err) {
                alert("❌ ติดต่อเซิร์ฟเวอร์ไม่ได้");
            } finally {
                btn.classList.remove('is-loading');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
