<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Splitter Management System</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f4f7f6; color: #2c3e50; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .system-header { background-color: #004d40; color: white; padding: 2rem 1rem; text-align: center; border-bottom: 5px solid #00c853; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .box { border-radius: 12px; margin-top: -30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 1px solid #e0e0e0; }
        .label { color: #555; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .locked-field { background-color: #f1f3f4 !important; color: #7f8c8d !important; cursor: not-allowed; border-color: #dcdde1 !important; }
        .input, .select select, .textarea { border-radius: 6px; border: 1px solid #ced4da; }
        .footer-text { text-align: center; font-size: 0.7rem; color: #bdc3c7; margin: 2rem 0; }
        .id-highlight { font-size: 1.25rem; font-weight: bold; color: #00796b; text-align: center; }
        .swal2-popup { border-radius: 15px !important; font-family: 'Segoe UI', sans-serif !important; }
    </style>
</head>
<body>
    <div class="system-header">
        <h1 class="title is-4 has-text-white">SPLITTER MANAGEMENT SYSTEM</h1>
        <p class="subtitle is-7 has-text-white-ter is-uppercase" style="letter-spacing: 2px;">Central Digital Operation Unit</p>
    </div>

    <div class="container p-3">
        <div id="loader" class="has-text-centered py-6">
            <button class="button is-loading is-white is-large"></button>
            <p class="is-size-7 mt-3 has-text-grey">Connecting to Central Database...</p>
        </div>

        <div id="formBody" class="box" style="display:none;">
            <div class="columns is-mobile is-variable is-2">
                <div class="column">
                    <div class="field">
                        <label class="label">Coordinate Data</label>
                        <input id="latLong" class="input is-small" type="text" placeholder="Pending AI Analysis">
                    </div>
                </div>
                <div class="column">
                    <div class="field">
                        <label class="label">Region / Province</label>
                        <input id="prov" class="input is-small" type="text" placeholder="Determining...">
                    </div>
                </div>
            </div>

            <hr class="my-4">

            <div class="field">
                <label class="label">Equipment ID (รหัสอุปกรณ์)</label>
                <div class="control">
                    <input id="spId" class="input is-success id-highlight" type="text" placeholder="ENTER ID" oninput="this.value = this.value.toUpperCase()">
                </div>
            </div>

            <div class="field">
                <label class="label">Equipment Type</label>
                <div class="select is-fullwidth">
                    <select id="type">
                        <option value="L2 Splitter">L2 Splitter</option>
                        <option value="L1 Splitter">L1 Splitter</option>
                        <option value="OLT / Hub Station">OLT / Hub Station</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">Inspection Category (กรณีตรวจสอบ)</label>
                <div class="select is-fullwidth">
                    <select id="mainCase" onchange="updateSubCase()">
                        <option value="">-- เลือกรายการตรวจสอบ --</option>
                        <option value="1. ภายนอก อุปกรณ์">1. สภาพภายนอกและโครงสร้าง</option>
                        <option value="2. ภายใน อุปกรณ์">2. ระบบภายในและพอร์ตเชื่อมต่อ</option>
                        <option value="3. งานย้ายและร้องเรียน">3. รายการร้องเรียน/ปรับปรุงพื้นที่</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">Sub-Case Details</label>
                <div class="select is-fullwidth">
                    <select id="subCase">
                        <option value="">-- โปรดเลือกกรณีหลักก่อน --</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">Technical Remarks (หมายเหตุ)</label>
                <textarea id="detail" class="textarea is-small" rows="2" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
            </div>

            <div class="mt-6">
                <button id="btnSave" onclick="submitData()" class="button is-success is-fullwidth has-text-weight-bold is-medium">💾 ยืนยันข้อมูลและบันทึกเข้าระบบ</button>
                <button onclick="liff.closeWindow()" class="button is-ghost is-fullwidth is-small mt-2">ยกเลิกรายการ</button>
            </div>
        </div>
        <p class="footer-text">CONFIDENTIAL SYSTEM - INTERNAL USE ONLY<br>© 2026 Splitter Operation Control Center</p>
    </div>

    <script>
        const LIFF_ID = "2009634741-xdYCjBwI";
        const API_URL = "https://script.google.com/macros/s/AKfycbzv8K1js2mArjDla9JJuDTV1QDQg44LoapMJKCvQQ2UXE2lw-TXufJCRXGJgpXdZf37nQ/exec"; 

        const subCaseMap = {
            "1. ภายนอก อุปกรณ์": ["1.1 ฝาปิดชำรุด/หาย", "1.2 การยึดเกาะไม่มั่นคง", "1.3 สายหย่อน/ตำแหน่งต่ำเกิน", "1.4 ตัวล็อกชำรุด"],
            "2. ภายใน อุปกรณ์": ["2.1 พอร์ตชำรุด", "2.2 Connector เสื่อมสภาพ", "2.3 ค่า Loss เกินมาตรฐาน"],
            "3. งานย้ายและร้องเรียน": ["3.1 ย้ายแนวสายตามคำร้อง", "3.2 เคสร้องเรียนจากลูกค้า", "3.3 กิ่งไม้บดบังอุปกรณ์"]
        };

        let userId = "";

        window.onload = async () => {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) { liff.login(); }
                else {
                    const profile = await liff.getProfile();
                    userId = profile.userId;
                    await loadOcrData();
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('formBody').style.display = 'block';
                }
            } catch (err) {
                Swal.fire({ icon: 'error', title: 'Connection Error', text: err.message });
            }
        };

        function updateSubCase() {
            const main = document.getElementById('mainCase').value;
            const sub = document.getElementById('subCase');
            sub.innerHTML = '<option value="">-- เลือกรายละเอียด --</option>';
            if (subCaseMap[main]) {
                subCaseMap[main].forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item; opt.innerHTML = item;
                    sub.appendChild(opt);
                });
            }
        }

        async function loadOcrData() {
            try {
                const res = await fetch(`${API_URL}?action=getDetectedProv&uid=${userId}`);
                const data = await res.json();
                if (data.latLong) {
                    const el = document.getElementById('latLong');
                    el.value = data.latLong; el.readOnly = true; el.classList.add('locked-field');
                }
                if (data.prov) {
                    const el = document.getElementById('prov');
                    el.value = data.prov; el.readOnly = true; el.classList.add('locked-field');
                }
            } catch(e) { console.warn("OCR Background Sync Offline"); }
        }

        async function submitData() {
            const spId = document.getElementById('spId').value;
            if (!spId || !document.getElementById('mainCase').value || !document.getElementById('subCase').value) {
                return Swal.fire({ icon: 'warning', title: 'ข้อมูลไม่ครบถ้วน', text: 'โปรดกรอกข้อมูลสำคัญให้ครบก่อนบันทึก', confirmButtonColor: '#004d40' });
            }

            const btn = document.getElementById('btnSave');
            btn.classList.add('is-loading');

            const payload = {
                userId: userId,
                userName: (await liff.getProfile()).displayName,
                type: document.getElementById('type').value,
                case: document.getElementById('mainCase').value,
                subCase: document.getElementById('subCase').value,
                id: spId,
                detail: document.getElementById('detail').value,
                prov: document.getElementById('prov').value,
                latLong: document.getElementById('latLong').value
            };

            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                const resultText = await response.text();
                
                Swal.fire({
                    icon: 'success',
                    title: 'บันทึกสำเร็จ',
                    text: 'ข้อมูลเข้าสู่ระบบเรียบร้อยแล้ว',
                    timer: 2000,
                    showConfirmButton: false,
                    willClose: () => { liff.closeWindow(); }
                });
            } catch (e) {
                Swal.fire({
                    icon: 'success',
                    title: 'ยืนยันการส่งข้อมูล',
                    text: 'ระบบประมวลผลเสร็จสิ้น ตรวจสอบรหัสงานใน LINE ครับ',
                    confirmButtonColor: '#00c853'
                }).then(() => { liff.closeWindow(); });
            }
        }
    </script>
</body>
</html>
