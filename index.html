<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ระบบบันทึกข้อมูล Splitter (Cloud Run v2)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f0f2f5; padding: 15px; font-family: 'Chakra Petch', sans-serif; }
        .box { border-radius: 15px; border-top: 6px solid #485fc7; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .label { font-size: 0.9rem; color: #363636; }
        .notification { border-radius: 10px; margin-bottom: 1.5rem; }
        .button.is-link { font-weight: bold; height: 3.5rem; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container is-max-desktop">
        <div class="box" id="mainForm" style="display: none;">
            <h1 class="title is-4 has-text-centered mb-5">📝 บันทึกข้อมูลงาน Splitter</h1>
            
            <div id="statusBox" class="notification is-link is-light has-text-centered py-3">
                <p id="locInfo" class="is-size-6">📡 กำลังดึงข้อมูลพิกัดจาก AI...</p>
            </div>
            
            <form id="dataForm" onsubmit="submitData(event)">
                <div class="field">
                    <label class="label">รหัสอุปกรณ์ (Splitter ID)</label>
                    <div class="control">
                        <input id="spId" class="input is-medium" type="text" placeholder="ตัวอย่าง: NRT-101" style="text-transform: uppercase;" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label">ประเภทอุปกรณ์</label>
                    <div class="control">
                        <div class="select is-fullwidth is-medium">
                            <select id="type" required>
                                <option>L2</option>
                                <option>L1</option>
                                <option>OLT</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label">หมวดหมู่ปัญหา</label>
                    <div class="control">
                        <div class="select is-fullwidth is-medium">
                            <select id="mainCase" onchange="updateSubCase()" required>
                                <option value="" disabled selected>-- เลือกหมวดหมู่ --</option>
                                <option>1. ภายนอก อุปกรณ์</option>
                                <option>2. ภายใน อุปกรณ์</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label">อาการที่พบ</label>
                    <div class="control">
                        <div class="select is-fullwidth is-medium">
                            <select id="subCase" required>
                                <option value="" disabled selected>-- เลือกหมวดหมู่ก่อน --</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label">หมายเหตุ / รายละเอียด</label>
                    <div class="control">
                        <textarea id="remark" class="textarea" placeholder="ระบุข้อมูลเพิ่มเติม..." rows="3" required></textarea>
                    </div>
                </div>

                <div class="mt-6">
                    <button type="submit" id="btnSave" class="button is-link is-fullwidth">💾 บันทึกข้อมูลลงตาราง</button>
                    <button type="button" onclick="liff.closeWindow()" class="button is-ghost is-fullwidth mt-2">ยกเลิก</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 🔗 URL ของ Cloud Run functions ที่ท่าน Deploy สำเร็จ
        const API_URL = "https://asia-southeast1-my-project-translate-400506.cloudfunctions.net/lineWebhook"; 
        const LIFF_ID = "2009632305"; 

        let cacheData = {}; 
        const subCases = {
            "1. ภายนอก อุปกรณ์": ["1.1 ฝาปิดชำรุด", "1.2 ไม่ได้ยึดตามมาตรฐาน", "1.3 สายหย่อน/ต่ำ", "1.4 สัตว์ทำรัง"],
            "2. ภายใน อุปกรณ์": ["2.1 Port เสีย", "2.2 Connector เสื่อมสภาพ", "2.3 สายพันกัน"]
        };

        function updateSubCase() {
            const main = document.getElementById('mainCase').value;
            const sub = document.getElementById('subCase');
            sub.innerHTML = '<option value="" disabled selected>-- เลือกอาการ --</option>';
            if(subCases[main]) subCases[main].forEach(i => sub.innerHTML += `<option value="${i}">${i}</option>`);
        }

        window.onload = async () => {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    // ตรวจสอบพิกัดที่ AI บันทึกไว้ใน Firestore
                    const res = await fetch(`${API_URL}/api/checkUser?uid=${profile.userId}`);
                    const data = await res.json();
                    
                    if (data.cache) {
                        cacheData = data.cache;
                        document.getElementById('locInfo').innerText = `📍 พิกัดที่ตรวจพบ: ${cacheData.latLong}`;
                        document.getElementById('mainForm').style.display = 'block';
                    } else {
                        alert("⚠️ ไม่พบข้อมูลพิกัด! กรุณาส่งรูปเข้า LINE Bot เพื่อให้ AI สแกนก่อนครับ");
                        liff.closeWindow();
                    }
                }
            } catch (err) {
                console.error(err);
                alert("❌ การเชื่อมต่อล้มเหลว");
            }
        };

        async function submitData(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSave');
            btn.classList.add('is-loading');

            const profile = await liff.getProfile();
            const payload = {
                uid: profile.userId,
                surveyName: profile.displayName,
                splitterId: document.getElementById('spId').value,
                type: document.getElementById('type').value,
                mainCase: document.getElementById('mainCase').value,
                subCase: document.getElementById('subCase').value,
                remark: document.getElementById('remark').value,
                latLong: cacheData.latLong,
                province: cacheData.province,
                tempFileName: cacheData.tempFileName
            };

            try {
                const res = await fetch(`${API_URL}/api/saveData`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();

                if (result.success) {
                    alert(`✅ บันทึกสำเร็จ!\nคิวงาน: ${result.queueId}`);
                    liff.closeWindow();
                } else {
                    alert("❌ บันทึกไม่สำเร็จ: " + result.error);
                }
            } catch (err) {
                alert("❌ ติดต่อเซิร์ฟเวอร์ไม่ได้");
            } finally {
                btn.classList.remove('is-loading');
            }
        }
    </script>
</body>
</html>
