<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>บันทึก SP (DG-System)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #eceff1; min-height: 100vh; display: flex; align-items: center; }
        .box { border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); width: 100%; max-width: 500px; margin: auto; }
        .label { color: #34495e; }
    </style>
</head>
<body class="p-2">
    <div class="box">
        <h1 class="title is-4 has-text-success has-text-centered">🛡️ บันทึกข้อมูล SP (Master)</h1>
        
        <div id="loader" class="has-text-centered py-6">
            <button class="button is-loading is-white is-large"></button>
            <p>กำลังเตรียมข้อมูลระบบ...</p>
        </div>

        <div id="formBody" style="display:none;">
            <div class="field">
                <label class="label">🔹 ประเภท (Type)</label>
                <div class="select is-fullwidth">
                    <select id="type">
                        <option value="L2">L2</option>
                        <option value="L1">L1</option>
                        <option value="OLT">OLT</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">📂 กรณี (Case)</label>
                <div class="select is-fullwidth">
                    <select id="mainCase" onchange="updateSubCase()">
                        <option value="">-- เลือกกรณี --</option>
                        <option value="1. ภายนอก อุปกรณ์">1. ภายนอก อุปกรณ์</option>
                        <option value="2. ภายใน อุปกรณ์">2. ภายใน อุปกรณ์</option>
                        <option value="3. งานย้ายและร้องเรียน">3. งานย้ายและร้องเรียน</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">🔍 ปัญหาย่อย (Sub_Case)</label>
                <div class="select is-fullwidth">
                    <select id="subCase">
                        <option value="">-- โปรดเลือกกรณีหลักก่อน --</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">📦 รหัส SP</label>
                <div class="control">
                    <input id="spId" class="input is-success" type="text" placeholder="กรอกรหัส SP" oninput="this.value = this.value.toUpperCase()">
                </div>
            </div>

            <div class="field">
                <label class="label">📝 หมายเหตุ / Remark</label>
                <div class="control">
                    <textarea id="detail" class="textarea" rows="2" placeholder="ระบุรายละเอียดเพิ่มเติม..."></textarea>
                </div>
            </div>

            <div class="mt-5">
                <button id="btnSave" onclick="saveData()" class="button is-success is-fullwidth is-large"><b>💾 ยืนยันบันทึก SP</b></button>
                <button onclick="liff.closeWindow()" class="button is-text is-fullwidth mt-2">ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009634741-xdYCjBwI"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbzv8K1js2mArjDla9JJuDTV1QDQg44LoapMJKCvQQ2UXE2lw-TXufJCRXGJgpXdZf37nQ/exec"; 

        const subCaseMap = {
            "1. ภายนอก อุปกรณ์": [
                "1.1 ไม่มีฝาปิด",
                "1.2 ไม่ได้ยึดเกาะตามมาตรฐาน (Bolt/สาย)",
                "1.3 ตำแหน่งไม่เหมาะสม (ต่ำ/หย่อน)",
                "1.4 ไม่มีฝาปิด",
                "1.5 ตัวล็อกชำรุด/หาย"
            ],
            "2. ภายใน อุปกรณ์": [
                "2.1 Port เสีย/ชำรุด (ระบุเบอร์ใน Remark)",
                "2.2 Pigtail / Connector เสื่อมสภาพ"
            ],
            "3. งานย้ายและร้องเรียน": [
                "3.1 ย้ายตำแหน่ง/แนวเสา",
                "3.2 เคสร้องเรียนจากลูกค้า"
            ]
        };

        function updateSubCase() {
            const main = document.getElementById('mainCase').value;
            const sub = document.getElementById('subCase');
            sub.innerHTML = '<option value="">-- เลือกปัญหาย่อย --</option>';
            if (subCaseMap[main]) {
                subCaseMap[main].forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item; opt.innerHTML = item;
                    sub.appendChild(opt);
                });
            }
        }

        window.onload = async () => {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); }
            else {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('formBody').style.display = 'block';
            }
        };

        async function saveData() {
            const spId = document.getElementById('spId').value;
            const main = document.getElementById('mainCase').value;
            const sub = document.getElementById('subCase').value;
            if (!spId || !main || !sub) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            const btn = document.getElementById('btnSave');
            btn.classList.add('is-loading');
            const profile = await liff.getProfile();
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const payload = {
                    userId: profile.userId,
                    userName: profile.displayName,
                    type: document.getElementById('type').value,
                    case: main,
                    subCase: sub,
                    id: spId,
                    detail: document.getElementById('detail').value,
                    latLong: `${pos.coords.latitude},${pos.coords.longitude}`
                };

                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                liff.sendMessages([{ type: 'text', text: `✅ บันทึก SP [${spId}] เรียบร้อยแล้ว!` }]);
                liff.closeWindow();
            }, (err) => { alert("กรุณาเปิด GPS"); btn.classList.remove('is-loading'); });
        }
    </script>
</body>
</html>
