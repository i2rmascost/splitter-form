<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>บันทึก SP (DG-System)</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
</head>
<body class="p-4">
    <div class="box mx-auto" style="max-width: 450px;">
        <h1 class="title is-4 has-text-success">🛡️ บันทึกข้อมูล SP</h1>
        
        <div id="loader" class="has-text-centered py-6">⌛ กำลังโหลดสมอง AI...</div>

        <div id="formBody" style="display:none;">
            <div class="field">
                <label class="label">จังหวัด (📍 Auto-Detected)</label>
                <div class="select is-fullwidth">
                    <select id="prov">
                        <option value="">-- เลือกจังหวัด --</option>
                        <option value="ชุมพร">ชุมพร (CPN)</option>
                        <option value="ระนอง">ระนอง (RNG)</option>
                        <option value="สุราษฎร์ธานี">สุราษฎร์ธานี (SRT)</option>
                        <option value="พังงา">พังงา (PNA)</option>
                        <option value="นครศรีธรรมราช">นครศรีธรรมราช (NKS)</option>
                        <option value="กระบี่">กระบี่ (KBI)</option>
                        <option value="ภูเก็ต">ภูเก็ต (PKT)</option>
                        <option value="พัทลุง">พัทลุง (PTL)</option>
                        <option value="ตรัง">ตรัง (TRG)</option>
                        <option value="สงขลา">สงขลา (SKA)</option>
                        <option value="ปัตตานี">ปัตตานี (PTN)</option>
                        <option value="สตูล">สตูล (STN)</option>
                        <option value="ยะลา">ยะลา (YLA)</option>
                        <option value="นราธิวาส">นราธิวาส (NRT)</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">รหัส SP</label>
                <input id="spId" class="input" type="text" placeholder="เช่น NKS01X0002" oninput="this.value = this.value.toUpperCase()">
            </div>

            <div class="field">
                <label class="label">รายละเอียด</label>
                <textarea id="detail" class="textarea" placeholder="ระบุสภาพหน้างาน..."></textarea>
            </div>

            <button id="btn" onclick="save()" class="button is-success is-fullwidth is-large">💾 ยืนยันบันทึก SP</button>
            <button onclick="liff.closeWindow()" class="button is-text is-fullwidth mt-2">❌ ยกเลิก</button>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009634741-xdYCjBwI";
        const API_URL = "https://script.google.com/macros/s/AKfycbzv8K1js2mArjDla9JJuDTV1QDQg44LoapMJKCvQQ2UXE2lw-TXufJCRXGJgpXdZf37nQ/exec";

        window.onload = async () => {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); }
            else {
                const profile = await liff.getProfile();
                // 📍 AI Auto-Province
                const res = await fetch(`${API_URL}?action=getDetectedProv&uid=${profile.userId}`);
                const data = await res.json();
                if (data.prov) {
                    document.getElementById('prov').value = data.prov;
                    document.getElementById('prov').parentElement.classList.add('is-success');
                }
                document.getElementById('loader').style.display = 'none';
                document.getElementById('formBody').style.display = 'block';
            }
        };

        async function save() {
            const btn = document.getElementById('btn');
            const spId = document.getElementById('spId').value;
            if(!spId) return alert("กรุณากรอกรหัส SP");

            btn.classList.add('is-loading');
            const profile = await liff.getProfile();
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const payload = {
                    userId: profile.userId,
                    userName: profile.displayName,
                    prov: document.getElementById('prov').value,
                    id: spId,
                    detail: document.getElementById('detail').value,
                    latLong: pos.coords.latitude + "," + pos.coords.longitude
                };

                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                liff.sendMessages([{ type: 'text', text: '✅ บันทึก SP [' + spId + '] สำเร็จ!' }]);
                liff.closeWindow();
            }, () => { alert("กรุณาเปิด GPS"); btn.classList.remove('is-loading'); });
        }
    </script>
</body>
</html>
