<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>บันทึก SP (DG-System)</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body class="p-4" style="background-color: #f5f7fa;">
    <div class="box mx-auto" style="max-width: 500px; border-radius: 15px;">
        <h1 class="title is-4 has-text-success has-text-centered">🛡️ บันทึกข้อมูล SP</h1>
        
        <div id="loader" class="has-text-centered py-6">
            <button class="button is-loading is-white is-large"></button>
            <p>กำลังเตรียมข้อมูล...</p>
        </div>

        <div id="formBody" style="display:none;">
            <div class="field">
                <label class="label">🔹 ประเภท (Type)</label>
                <div class="select is-fullwidth">
                    <select id="type">
                        <option value="L2">L2</option>
                        <option value="L1">L1</option>
                        <option value="OLT">OLT</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">📂 กรณี (Case)</label>
                <div class="select is-fullwidth">
                    <select id="mainCase" onchange="updateSubCase()">
                        <option value="">-- เลือกกรณี --</option>
                        <option value="1. ภายนอก อุปกรณ์">1. ภายนอก อุปกรณ์</option>
                        <option value="2. ภายใน อุปกรณ์">2. ภายใน อุปกรณ์</option>
                        <option value="3. งานย้ายและร้องเรียน">3. งานย้ายและร้องเรียน</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">🔍 ปัญหาย่อย (Sub_Case)</label>
                <div class="select is-fullwidth">
                    <select id="subCase">
                        <option value="">-- โปรดเลือกกรณีหลักก่อน --</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label class="label">📦 รหัส SP</label>
                <input id="spId" class="input is-success" type="text" placeholder="เช่น NKS01X0002" oninput="this.value = this.value.toUpperCase()">
            </div>

            <div class="field">
                <label class="label">📝 หมายเหตุ</label>
                <textarea id="detail" class="textarea" placeholder="ระบุเพิ่มเติม..."></textarea>
            </div>

            <button id="btnSave" onclick="saveData()" class="button is-success is-fullwidth is-large mt-4">💾 ยืนยันบันทึกข้อมูล</button>
            <button onclick="liff.closeWindow()" class="button is-text is-fullwidth mt-2">❌ ยกเลิก</button>
        </div>
    </div>

    <script>
        const LIFF_ID = "2009634741-xdYCjBwI"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbzv8K1js2mArjDla9JJuDTV1QDQg44LoapMJKCvQQ2UXE2lw-TXufJCRXGJgpXdZf37nQ/exec"; 

        // ข้อมูล Mapping สำหรับ Sub_Case
        const subCaseMap = {
            "1. ภายนอก อุปกรณ์": [
                "1.1 ไม่มีฝาปิด",
                "1.2 ไม่ได้ยึดเกาะตามมาตรฐาน (Bolt/สาย)",
                "1.3 ตำแหน่งไม่เหมาะสม (ต่ำ/หย่อน)",
                "1.4 ไม่มีฝาปิด",
                "1.5 ตัวล็อกชำรุด/หาย"
            ],
            "2. ภายใน อุปกรณ์": [
                "2.1 Port เสีย/ชำรุด (ระบุเบอร์ใน Remark)",
                "2.2 Pigtail / Connector เสื่อมสภาพ"
            ],
            "3. งานย้ายและร้องเรียน": [
                "3.1 ย้ายตำแหน่ง/แนวเสา",
                "3.2 เคสร้องเรียนจากลูกค้า"
            ]
        };

        function updateSubCase() {
            const mainCase = document.getElementById('mainCase').value;
            const subCaseSelect = document.getElementById('subCase');
            subCaseSelect.innerHTML = '<option value="">-- เลือกปัญหาย่อย --</option>';
            
            if (subCaseMap[mainCase]) {
                subCaseMap[mainCase].forEach(item => {
                    let opt = document.createElement('option');
                    opt.value = item;
                    opt.innerHTML = item;
                    subCaseSelect.appendChild(opt);
                });
            }
        }

        window.onload = async () => {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); }
            else {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('formBody').style.display = 'block';
            }
        };

        async function saveData() {
            const spId = document.getElementById('spId').value;
            const mainCase = document.getElementById('mainCase').value;
            const subCase = document.getElementById('subCase').value;
            if (!spId || !mainCase || !subCase) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");

            const btn = document.getElementById('btnSave');
            btn.classList.add('is-loading');
            const profile = await liff.getProfile();
            
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const payload = {
                    userId: profile.userId,
                    userName: profile.displayName,
                    type: document.getElementById('type').value,
                    case: mainCase,
                    subCase: subCase,
                    id: spId,
                    detail: document.getElementById('detail').value,
                    latLong: `${pos.coords.latitude},${pos.coords.longitude}`
                };

                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                liff.sendMessages([{ type: 'text', text: `✅ บันทึก SP [${spId}] เรียบร้อย!` }]);
                liff.closeWindow();
            }, (err) => { alert("กรุณาเปิด GPS"); btn.classList.remove('is-loading'); });
        }
    </script>
</body>
</html>
