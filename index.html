<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OPS SURVEY | Field Operations</title>
    <!-- 🛡️ SDK & Library Integration -->
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/spark-md5/3.0.2/spark-md5.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');
        :root { --primary: #1e40af; --bg-app: #f1f5f9; }
        body { font-family: 'Sarabun', sans-serif; background: #020617; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        
        /* 📱 Mobile Wrapper (Original Design) */
        .app-container { background: #ffffff; min-height: 100vh; display: flex; flex-direction: column; width: 100%; max-width: 500px; margin: 0 auto; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.3); }
        @media (min-width: 640px) { .app-container { min-height: 90vh; margin-top: 5vh; margin-bottom: 5vh; border-radius: 1.5rem; overflow: hidden; } }
        
        .form-input { width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; padding: 0.875rem 1rem; border-radius: 0.75rem; font-size: 0.95rem; outline: none; transition: all 0.2s; font-weight: 500; }
        .form-input:focus { border-color: var(--primary); background: #ffffff; box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.05); }
        
        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; transition: 0.3s; }
        .step-active .step-dot { background: var(--primary); transform: scale(1.5); box-shadow: 0 0 10px rgba(30, 64, 175, 0.3); }
        .step-active span { color: var(--primary); font-weight: 800; }

        /* 🤖 Scan-line Effect (AI Interface) */
        .scan-line { height: 2px; width: 100%; background: #3b82f6; position: absolute; top: 0; left: 0; box-shadow: 0 0 10px #3b82f6; animation: scan 3s linear infinite; }
        @keyframes scan { 0% { top: 0%; } 100% { top: 100%; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 🏗️ Header Section -->
    <header class="p-5 border-b border-gray-100 flex justify-between items-center bg-white sticky top-0 z-20 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-blue-800 rounded-lg flex items-center justify-center shadow-lg">
                <i data-lucide="workflow" class="w-6 h-6 text-white"></i>
            </div>
            <div>
                <h1 class="text-lg font-black text-gray-900 tracking-tight">OPS <span class="text-blue-700 italic">SURVEY</span></h1>
                <p class="text-[8px] font-black text-gray-400 uppercase tracking-widest">Field Node V76.4</p>
            </div>
        </div>
        <div class="flex items-center gap-2 bg-slate-50 px-3 py-1.5 rounded-full border border-slate-100">
            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
            <span class="text-[10px] font-bold text-slate-600" id="user-display">Connecting...</span>
        </div>
    </header>

    <main class="flex-1 flex flex-col p-5 overflow-y-auto no-scrollbar">
        
        <!-- 🌀 VIEW 1: SYNCING -->
        <div id="view-sync" class="flex-1 flex flex-col items-center justify-center space-y-4 py-20">
            <div class="w-12 h-12 border-4 border-blue-800 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Establishing Secure Node</p>
        </div>

        <!-- 📝 VIEW 2: REGISTRATION -->
        <div id="view-reg" class="hidden flex-1 animate-in fade-in">
            <div class="mb-8">
                <h2 class="text-xl font-bold text-slate-800">ลงทะเบียนพนักงาน</h2>
                <p class="text-sm text-slate-400 mt-1">บันทึกข้อมูลเพื่อเปิดใช้งานระบบ OPS SURVEY</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="reg-name" class="form-input" placeholder="ชื่อ-นามสกุลจริง">
                <input type="text" id="reg-empid" class="form-input" placeholder="รหัสพนักงาน">
                <input type="tel" id="reg-phone" class="form-input" placeholder="เบอร์โทรศัพท์">
            </div>
            <button id="btn-do-reg" class="w-full mt-10 bg-blue-800 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-900/20 active:scale-95 transition-transform">เริ่มงาน</button>
        </div>

        <!-- 🚀 VIEW 3: MAIN OPERATION -->
        <div id="view-main" class="hidden flex-1 flex flex-col">
            <!-- Stepper Progress -->
            <div class="flex justify-between items-center px-10 mb-8">
                <div id="dot-1" class="step-active flex flex-col items-center gap-2"><div class="step-dot"></div><span class="text-[9px] font-black text-slate-400">Capture</span></div>
                <div id="dot-2" class="flex flex-col items-center gap-2"><div class="step-dot"></div><span class="text-[9px] font-black text-slate-400">AI Scan</span></div>
                <div id="dot-3" class="flex flex-col items-center gap-2"><div class="step-dot"></div><span class="text-[9px] font-black text-slate-400">Report</span></div>
            </div>

            <!-- DECK 1: Camera Trigger -->
            <div id="deck-capture" class="block">
                <div id="btn-camera" class="bg-slate-50 border-2 border-dashed border-slate-200 rounded-[2.5rem] p-16 flex flex-col items-center justify-center space-y-4 cursor-pointer hover:bg-blue-50 transition-colors">
                    <i data-lucide="camera" class="w-12 h-12 text-blue-800"></i>
                    <p class="font-bold text-slate-700">แตะเพื่อถ่ายภาพงาน</p>
                    <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest italic">Ensure GPS Watermark is Visible</p>
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                </div>
            </div>

            <!-- DECK 2: AI Scanning Animation -->
            <div id="deck-scanning" class="hidden relative rounded-3xl overflow-hidden aspect-[3/4] bg-slate-900 border-4 border-white shadow-xl">
                <img id="preview-img" class="w-full h-full object-contain opacity-60">
                <div class="scan-line"></div>
                <div class="absolute inset-0 flex flex-col items-center justify-center bg-white/80 backdrop-blur-[2px]">
                    <div class="w-14 h-14 border-4 border-blue-800 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p class="text-blue-800 font-black text-xs uppercase tracking-[0.3em] animate-pulse">AI Forensic Scanning...</p>
                </div>
            </div>

            <!-- DECK 3: Reporting Form -->
            <div id="deck-form" class="hidden space-y-4 animate-in slide-in-from-bottom-8">
                <!-- AI Results Header -->
                <div class="bg-blue-800 p-5 rounded-2xl text-white flex justify-between items-center shadow-lg">
                    <div>
                        <p class="text-[8px] font-black uppercase opacity-60 tracking-widest">GPS Verified</p>
                        <p id="res-gps" class="text-xs font-mono font-bold tracking-tighter">--</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[8px] font-black uppercase opacity-60 tracking-widest">Province</p>
                        <p id="res-prov" class="text-2xl font-black italic tracking-tighter uppercase">--</p>
                    </div>
                </div>

                <!-- Input Fields -->
                <div class="space-y-4">
                    <input type="text" id="f-eq" class="form-input uppercase font-bold text-blue-800" placeholder="รหัสอุปกรณ์ (Equipment ID)">
                    
                    <div class="grid grid-cols-2 gap-3">
                        <select id="f-type" class="form-input font-bold"><option value="L2">Type: L2</option><option value="L1">Type: L1</option><option value="OLT">Type: OLT</option></select>
                        <select id="f-pri" class="form-input font-bold"><option value="Normal">Pri: Normal</option><option value="High">Pri: High</option><option value="Critical">Pri: Critical</option></select>
                    </div>

                    <select id="f-case" class="form-input font-bold">
                        <option value="งานสำรวจปกติ">หมวดงาน: งานสำรวจปกติ</option>
                        <option value="งานแก้ไขอุปกรณ์">หมวดงาน: งานแก้ไขอุปกรณ์</option>
                        <option value="งานร้องเรียน">หมวดงาน: งานร้องเรียน</option>
                    </select>

                    <textarea id="f-remark" class="form-input h-28 resize-none" placeholder="ระบุอาการเสีย หรือข้อมูลเพิ่มเติม (หมายเหตุ)..."></textarea>
                </div>

                <div class="pt-2 space-y-3">
                    <button id="btn-submit" class="w-full py-5 bg-blue-800 text-white rounded-2xl font-black flex justify-center items-center gap-3 shadow-xl active:scale-95 transition-transform uppercase tracking-widest">
                        <i data-lucide="send" class="w-5 h-5"></i> บันทึกและส่งข้อมูล
                    </button>
                    <button id="btn-cancel" class="w-full py-2 text-[10px] text-slate-400 font-bold uppercase tracking-widest">ยกเลิกและเริ่มใหม่</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 🔄 Global Loading Overlay -->
    <div id="global-loader" class="hidden fixed inset-0 bg-white/90 z-50 flex flex-col items-center justify-center backdrop-blur-sm">
        <div class="w-16 h-16 border-[6px] border-blue-100 border-t-blue-800 rounded-full animate-spin"></div>
        <p class="mt-4 text-blue-800 font-black text-[10px] uppercase tracking-[0.4em] animate-pulse">Transmitting Data</p>
    </div>
</div>

<script>
    // 🧠 Octopus Central Nervous System
    const Brain = new EventTarget();
    const emit = (e, d = {}) => Brain.dispatchEvent(new CustomEvent(e, { detail: d }));
    const listen = (e, c) => Brain.addEventListener(e, (ev) => c(ev.detail));

    const LIFF_ID = "2009634741-xdYCjBwI";
    const State = { userId: "", userName: "", empId: "", base64: "", imgHash: "", gps: {} };

    // 🐙 หนวดที่ 1: การยืนยันตัวตน (Authentication)
    window.onload = async () => {
        lucide.createIcons();
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            State.userId = profile.userId;
            emit('API:CALL', { action: "AUTH_CHECK", payload: { userId: State.userId }, onSuccess: 'AUTH:RESULT' });
        } catch (e) { emit('SYS:ERROR', "LIFF Connection Failed"); }
    };

    listen('AUTH:RESULT', (res) => {
        if (res.registered) {
            State.userName = res.name;
            State.empId = res.empId;
            document.getElementById('user-display').innerText = res.name;
            emit('UI:SWITCH_VIEW', 'view-main');
        } else {
            emit('UI:SWITCH_VIEW', 'view-reg');
        }
    });

    // 🐙 หนวดที่ 2: ระบบสื่อสาร API (Gateway)
    listen('API:CALL', ({ action, payload, onSuccess }) => {
        if (typeof google !== 'undefined') {
            google.script.run
                .withSuccessHandler(res => { if(res.success) emit(onSuccess, res); else emit('SYS:ERROR', res.error); })
                .withFailureHandler(err => emit('SYS:ERROR', err.message))
                .apiGateway({ action, payload });
        } else {
            // Mock For Canvas Preview
            setTimeout(() => {
                if(action === 'AUTH_CHECK') emit(onSuccess, { success: true, registered: true, name: "Commander Demo", empId: "123" });
                if(action === 'AI_ANALYZE') emit(onSuccess, { success: true, data: { lat: 8.442, lng: 99.331, province: "NKS", imgHash: "fake-hash" } });
            }, 1500);
        }
    });

    // 🐙 หนวดที่ 3: ระบบจัดการรูปภาพ & AI (Image Hub)
    document.getElementById('btn-camera').onclick = () => document.getElementById('file-input').click();
    document.getElementById('file-input').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (ev) => {
            const fullBase64 = ev.target.result;
            State.base64 = fullBase64.split(',')[1];
            
            // 🚫 Anti-Fraud: สร้าง Fingerprint ของภาพ
            State.imgHash = SparkMD5.hash(State.base64);
            
            document.getElementById('preview-img').src = fullBase64;
            emit('UI:SWITCH_DECK', 2);
            emit('API:CALL', { action: "AI_ANALYZE", payload: { base64: State.base64 }, onSuccess: 'AI:SUCCESS' });
        };
        reader.readAsDataURL(file);
    };

    listen('AI:SUCCESS', (res) => {
        State.gps = res.data;
        document.getElementById('res-gps').innerText = `${res.data.lat}, ${res.data.lng}`;
        document.getElementById('res-prov').innerText = res.data.province;
        emit('UI:SWITCH_DECK', 3);
    });

    // 🐙 หนวดที่ 4: ระบบบันทึกงาน (Submission Hub)
    document.getElementById('btn-submit').onclick = () => {
        const eq = document.getElementById('f-eq').value.trim();
        const remark = document.getElementById('f-remark').value.trim();
        
        if(!eq || !remark) {
            Swal.fire({ icon: 'warning', title: 'กรุณากรอกข้อมูลให้ครบ', text: 'ต้องใส่รหัสอุปกรณ์และหมายเหตุทุกครั้งครับ', confirmButtonColor: '#1e40af' });
            return;
        }

        document.getElementById('global-loader').classList.remove('hidden');
        emit('API:CALL', {
            action: "DB_SUBMIT_JOB",
            payload: {
                userId: State.userId,
                userName: State.userName,
                lat: State.gps.lat,
                lng: State.gps.lng,
                province: State.gps.province,
                equipment: eq,
                remark: remark,
                type: document.getElementById('f-type').value,
                priority: document.getElementById('f-pri').value,
                caseType: document.getElementById('f-case').value,
                base64: State.base64,
                imgHash: State.imgHash
            },
            onSuccess: 'SUBMIT:DONE'
        });
    };

    listen('SUBMIT:DONE', (res) => {
        document.getElementById('global-loader').classList.add('hidden');
        Swal.fire({
            icon: 'success',
            title: 'ส่งงานสำเร็จ!',
            text: `รหัสใบงาน: ${res.qid}`,
            confirmButtonColor: '#1e40af'
        }).then(() => liff.closeWindow());
    });

    // 🐙 หนวดที่ 5: ระบบควบคุม UI (UI Master)
    listen('UI:SWITCH_VIEW', (v) => {
        ['view-sync', 'view-reg', 'view-main'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(v).classList.remove('hidden');
    });

    listen('UI:SWITCH_DECK', (n) => {
        ['deck-capture', 'deck-scanning', 'deck-form'].forEach(id => document.getElementById(id).classList.add('hidden'));
        document.getElementById(['deck-capture', 'deck-scanning', 'deck-form'][n-1]).classList.remove('hidden');
        for(let i=1; i<=3; i++) {
            document.getElementById('dot-'+i).className = (i===n ? 'step-active' : '') + ' flex flex-col items-center gap-2';
        }
        lucide.createIcons();
    });

    listen('SYS:ERROR', (msg) => {
        document.getElementById('global-loader').classList.add('hidden');
        Swal.fire({ icon: 'error', title: 'ระบบขัดข้อง', text: msg, confirmButtonColor: '#1e40af' });
        emit('UI:SWITCH_DECK', 1);
    });

    document.getElementById('btn-cancel').onclick = () => {
        document.getElementById('file-input').value = "";
        emit('UI:SWITCH_DECK', 1);
    };

    document.getElementById('btn-do-reg').onclick = () => {
        const name = document.getElementById('reg-name').value.trim();
        const phone = document.getElementById('reg-phone').value.trim();
        const emp = document.getElementById('reg-empid').value.trim();
        if(!name || !phone) return;
        
        document.getElementById('global-loader').classList.remove('hidden');
        emit('API:CALL', { 
            action: 'AUTH_REGISTER', 
            payload: { userId: State.userId, fullName: name, empId: emp, phone: phone }, 
            onSuccess: 'REG:SUCCESS' 
        });
    };
    listen('REG:SUCCESS', () => location.reload());

</script>
</body>
</html>
