<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>บันทึกตู้ Splitter</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <style>
        body { background:#f5f7fa; padding:20px; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .box { width:100%; max-width:400px; border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="box">
        <h1 class="title is-4 has-text-centered has-text-success">บันทึกตู้ Splitter</h1>
        <div id="loader" class="has-text-centered py-5">⌛ กำลังเตรียมระบบ...</div>
        
        <div id="formBody" style="display:none;">
            <div class="field">
                <label class="label">จังหวัด</label>
                <input id="p" class="input is-medium" type="text" placeholder="ระบุจังหวัด">
            </div>
            <div class="field">
                <label class="label">รหัสตู้ Splitter</label>
                <input id="s" class="input is-medium" type="text" placeholder="ระบุรหัสตู้">
            </div>
            <div class="field">
                <label class="label">รายละเอียดเพิ่มเติม</label>
                <textarea id="d" class="textarea" placeholder="ระบุสภาพตู้"></textarea>
            </div>
            <button id="btnSubmit" onclick="save()" class="button is-success is-fullwidth is-large">💾 ยืนยันบันทึก</button>
        </div>
    </div>

    <script>
        // --- ⚙️ จุดที่ 1: LIFF ID ของท่าน ---
        const LIFF_ID = "2009634741-xdYCjBwI";
        
        // --- ⚙️ จุดที่ 2: API URL (Google Script) ของท่าน ---
        const API_URL = "https://script.google.com/macros/s/AKfycbzv8K1js2mArjDla9JJuDTV1QDQg44LoapMJKCvQQ2UXE2lw-TXufJCRXGJgpXdZf37nQ/exec";

        window.onload = async () => {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('formBody').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('loader').innerText = "Init Error: " + e.message;
            }
        };

        async function save() {
            const btn = document.getElementById('btnSubmit');
            const p = document.getElementById('p').value;
            const s = document.getElementById('s').value;
            const d = document.getElementById('d').value;

            if (!p || !s) return alert("กรุณากรอกข้อมูลให้ครบครับ");

            btn.classList.add('is-loading');
            
            try {
                const profile = await liff.getProfile();
                
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const payload = {
                        userId: profile.userId,
                        prov: p,
                        id: s,
                        detail: d,
                        latLong: pos.coords.latitude + "," + pos.coords.longitude
                    };

                    // --- ⚙️ จุดที่ 3: การส่งข้อมูล (รวม mode: 'no-cors') ---
                    await fetch(API_URL, {
                        method: 'POST',
                        mode: 'no-cors', // 🚨 นี่คือหัวใจสำคัญที่ทำให้ส่งผ่าน!
                        body: JSON.stringify(payload)
                    });

                    // ส่งข้อความยืนยันในแชท
                    await liff.sendMessages([{
                        type: 'text',
                        text: '✅ บันทึกข้อมูลตู้ [' + s + '] เรียบร้อยแล้ว!'
                    }]);
                    
                    liff.closeWindow();
                }, (err) => {
                    alert("กรุณาเปิด GPS และอนุญาตสิทธิ์พิกัด");
                    btn.classList.remove('is-loading');
                });

            } catch (err) {
                alert("เกิดข้อผิดพลาด: " + err.message);
                btn.classList.remove('is-loading');
            }
        }
    </script>
</body>
</html>
